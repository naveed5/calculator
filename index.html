<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonus Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Compensation Tool</p>
        <h1>Annual Bonus Calculator</h1>
        <p class="subtext">
          Enter career level, annual salary, and performance rating to estimate final bonus eligibility.
        </p>
      </section>

      <section class="calculator-card" aria-label="Bonus calculator form">
        <form id="bonus-form" novalidate>
          <label for="career-level">Career Level</label>
          <input
            id="career-level"
            name="careerLevel"
            type="number"
            min="10"
            step="1"
            placeholder="e.g. 50"
            required
          />

          <label for="annual-salary">Annual Salary (USD)</label>
          <input
            id="annual-salary"
            name="annualSalary"
            type="number"
            min="0"
            step="0.01"
            placeholder="e.g. 25000"
            required
          />

          <label for="performance-rating">Performance Rating</label>
          <select id="performance-rating" name="performanceRating" required>
            <option value="" selected disabled>Select rating</option>
            <option value="exceptional">Exceptional</option>
            <option value="successful">Successful</option>
            <option value="average">Average</option>
            <option value="below_expectations">Below Expectations</option>
          </select>

          <button type="submit">Calculate Bonus</button>
        </form>

        <div id="result" class="result" aria-live="polite">
          <p>Bonus amount will appear here.</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
